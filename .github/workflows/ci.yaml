name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Explicit permissions for least-privilege security
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          check-latest: true

      - uses: extractions/setup-just@v2

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        env:
          GOWORK: "off"
        with:
          version: "v2.8.0"
          args: --timeout=5m

      - name: Verify Clean State
        run: just check-clean

      - name: Run Unit Tests (Common)
        run: just test

  api-compatibility:
    name: API Compatibility
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          check-latest: true

      - name: Install gorelease
        run: go install golang.org/x/exp/cmd/gorelease@latest

      - name: Check API compatibility (root module)
        run: gorelease
        continue-on-error: true

      - name: Check API compatibility (observers/terminal)
        working-directory: observers/terminal
        run: gorelease
        continue-on-error: true
